<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#4facfe,#00f2fe)}
.container{background:rgba(255,255,255,.15);backdrop-filter:blur(10px);padding:25px;border-radius:20px;width:360px;color:#fff;box-shadow:0 8px 24px rgba(0,0,0,.2)}
h1{text-align:center;margin-bottom:15px}
.search{display:flex;gap:10px;margin-bottom:20px}
input{flex:1;padding:10px;border:none;border-radius:10px;outline:none}
button{padding:10px 14px;border:none;border-radius:10px;background:#fff;color:#0077ff;font-weight:bold;cursor:pointer}
.weather{text-align:center;display:none}
.temp{font-size:48px;font-weight:bold;margin:10px 0}
.desc{text-transform:capitalize;margin-bottom:10px}
.details{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:15px}
.card{background:rgba(255,255,255,.18);padding:12px;border-radius:12px}
.error{text-align:center;color:#ffe0e0;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<h1>Weather App</h1>
<div class="search">
<input type="text" id="city" placeholder="Enter city name">
<button onclick="getWeather()">Search</button>
</div>
<div class="weather" id="weatherBox">
<h2 id="location"></h2>
<div style="font-size:60px" id="icon">☀️</div>
<div class="temp" id="temp"></div>
<div class="desc" id="desc"></div>
<div class="details">
<div class="card">Humidity<br><b id="humidity"></b></div>
<div class="card">Wind<br><b id="wind"></b></div>
</div>
</div>
<div class="error" id="error"></div>
</div>
<script>
async function getWeather(){
 const city=document.getElementById('city').value.trim();
 const error=document.getElementById('error');
 const box=document.getElementById('weatherBox');
 error.textContent='';
 if(!city){error.textContent='Please enter a city name';return;}
 try{
   const geo=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(city)}&count=1`);
   const geoData=await geo.json();
   if(!geoData.results || geoData.results.length===0){throw new Error('City not found');}
   const place=geoData.results[0];
   const res=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${place.latitude}&longitude=${place.longitude}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code`);
   const data=await res.json();
   const cur=data.current;
   document.getElementById('location').textContent=`${place.name}, ${place.country}`;
   document.getElementById('temp').textContent=cur.temperature_2m+'°C';
   document.getElementById('humidity').textContent=cur.relative_humidity_2m+'%';
   document.getElementById('wind').textContent=cur.wind_speed_10m+' km/h';
   const info=getWeatherInfo(cur.weather_code);
   document.getElementById('desc').textContent=info.text;
   document.getElementById('icon').textContent=info.icon;
   box.style.display='block';
 }catch(e){box.style.display='none';error.textContent=e.message;}
}
function getWeatherInfo(code){
 const map={0:['Clear Sky','☀️'],1:['Mainly Clear','🌤️'],2:['Partly Cloudy','⛅'],3:['Cloudy','☁️'],45:['Fog','🌫️'],61:['Rain','🌧️'],63:['Rain','🌧️'],65:['Heavy Rain','⛈️'],71:['Snow','❄️'],80:['Rain Showers','🌦️'],95:['Thunderstorm','⚡']};
 const item=map[code]||['Normal Weather','🌍'];
 return {text:item[0],icon:item[1]};
}
</script>
</body>
</html>
